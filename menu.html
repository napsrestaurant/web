	color:#ffc107;

	/* Cards */

	.card{
	background:#1e1e1e;
	color:#f1f1f1;

	}

	.card-text{
	color:#cccccc;
	}

	.card-footer{
	background:#1e1e1e;
	border-top:1px solid #333;
	}

	/* Images */

	.card-img-top{
	height:220px;

/* Floating Call Button */

/* Floating Call Buttons Container */

.floating-buttons{
position:fixed;
bottom:25px;
right:25px;
display:flex;
flex-direction:column;
gap:12px;
z-index:999;
}

/* Button Design */

.floating-call{
display:flex;
align-items:center;
gap:12px;
background:#ffc107;
color:#111;
padding:12px 18px;
border-radius:50px;
font-weight:600;
font-size:14px;
text-decoration:none;
box-shadow:0 8px 20px rgba(0,0,0,0.45);
transition:all .25s ease;
}

/* Icon circle */

.floating-call i{
background:#111;
color:#ffc107;
width:34px;
height:34px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
}

/* Hover */

.floating-call:hover{
transform:translateY(-3px);
background:#ffca2c;
box-shadow:0 12px 25px rgba(0,0,0,0.5);
color:#111;
}
</style>

</head>
